<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sperry Univac Instruction Macro Compiler</title>
    <!-- Inject Gantry's base structural grid styling elements -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <style>
        body { background-color: #121212; color: #FFF; font-family: monospace; padding: 20px; }
        .builder-workspace { display: flex; gap: 20px; height: 80vh; }
        
        /* Left Hand Module Drawer Panel */
        .instruction-drawer { width: 250px; background: #1C1C1C; border: 1px solid #333; padding: 10px; border-radius: 4px; overflow-y: auto;}
        .draggable-instruction-block { background: #2D2D2D; border-left: 4px solid #4AD2FF; padding: 8px; margin-bottom: 8px; cursor: grab; font-size: 11px; }
        .draggable-instruction-block:active { cursor: grabbing; }

        /* Center Grid Assembly Dropzone */
        .gantry-layout-canvas { flex-grow: 1; background: #161616; border: 2px dashed #444; border-radius: 4px; padding: 15px; overflow-y: auto; position: relative; }
        .gantry-dropped-row { display: flex; background: #222; border: 1px solid #333; margin-bottom: 10px; padding: 10px; align-items: center; position: relative;}
        .remove-btn { background: #D1172B; color: white; border: none; padding: 2px 6px; cursor: pointer; font-size: 10px; position: absolute; right: 5px; top: 5px;}

        /* Right Panel Save Management Deck */
        .template-save-deck { width: 300px; background: #1C1C1C; border: 1px solid #333; padding: 15px; border-radius: 4px; display: flex; flex-direction: column; gap: 10px;}
        .script-input { background: #0A0A0A; border: 1px solid #444; color: #4AD2FF; font-family: monospace; padding: 6px; width: 100%; box-sizing: border-box;}
    </style>
</head>
<body>
    <h2>SPERRY UNIVAC DRAG-AND-DROP SCRIPT COMPILER</h2>
    <p>Drag instructions into the grid to stack functions into a saved Morse command macro script.</p>

    <div class="builder-workspace">
        <!-- Drawer containing draggable elements -->
        <div class="instruction-drawer" id="gantry-sidebar-drawer">
            <h3>INSTRUCTIONS</h3>
            <!-- Generated dynamically via Javascript matrix maps -->
        </div>

        <!-- The Visual Dropzone Area Grid Canvas -->
        <div class="gantry-layout-canvas" id="gantry-dropzone-canvas">
            <div style="color: #666; text-align: center; margin-top: 20%;" id="canvas-placeholder">
                [ DROP MACHINE INSTRUCTIONS HERE TO BUILD TRANSMISSION STACK ]
            </div>
        </div>

        <!-- Saved Macro Form Properties Pane -->
        <div class="template-save-deck">
            <h3>SAVE TEMPLATE STYLE</h3>
            <label>Template Style Script Name:</label>
            <input type="text" class="script-input" id="macro-style-name" value="APPLIANCE_RADAR_SYNC">
            
            <label>Target Core Node Address:</label>
            <input type="text" class="script-input" id="macro-node-target" value="NODE_01">

            <button id="kvm-big-red-cycle" style="position: static; width: 100%; height: 40px; margin-top: auto; font-style: normal;">
                SAVE MORSE TEMPLATE
            </button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
